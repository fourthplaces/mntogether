[package]
name = "server"
version.workspace = true
edition.workspace = true

[lib]
name = "server_core"
path = "src/lib.rs"

[[bin]]
name = "migrate_cli"
path = "src/bin/migrate_cli.rs"

[[bin]]
name = "run_migrations"
path = "src/bin/run_migrations.rs"

[[bin]]
name = "server"
path = "src/bin/server.rs"

[dependencies]
# Async runtime
tokio = { workspace = true }
async-trait = "0.1"
futures = "0.3"
tokio-stream = { version = "0.1", features = ["sync"] }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# IDs and timestamps
uuid = { workspace = true }
chrono = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Authentication
twilio = { path = "../twilio-rs" }
jsonwebtoken = "9"

# Hashing
md5 = "0.7"

# Database
sqlx = { workspace = true, features = ["migrate"] }
dataloader = "0.18"
pgvector = { version = "0.4", features = ["sqlx", "serde"] }

# JSON Schema generation (used by AI tool definitions and structured extraction)
schemars = "0.8"

# AI / LLM
ai-client = { path = "../ai-client" }

# HTTP client
reqwest = { workspace = true }
url = "2.5"
hyper = { version = "1", features = ["full"] }

# S3-compatible object storage (MinIO / AWS S3 / R2)
aws-config = { version = "1", features = ["behavior-version-latest"] }
aws-sdk-s3 = { version = "1", features = ["behavior-version-latest"] }

# RFC 5545 recurrence rules (calendar events)
rrule = "0.14"

# Environment
dotenvy = { workspace = true }

# Content hashing (duplicate detection)
sha2 = { workspace = true }

# Hex encoding
hex = "0.4"

# Base64 encoding (for cursor pagination)
base64 = "0.22"

# Builder pattern
typed-builder = "0.20"

# PII Detection and Redaction
regex = "1.10"
lazy_static = "1.4"
rust_decimal = { version = "1.40.0", features = ["db-postgres", "serde", "std"] }

# CLI (for migrate_cli)
clap = { version = "4.5", features = ["derive"] }

# HTTP types (used by axum)
http = "1"

# HTTP server
axum = "0.8"

[dev-dependencies]
# Testing
tokio-test = "0.4"
test-context = "0.3"
testcontainers = { workspace = true }
testcontainers-modules = { version = "0.11", features = ["postgres"] }
indexmap = "2.0"
