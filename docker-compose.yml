services:
  # ========================================
  # PostgreSQL with pgvector extension
  # ========================================
  postgres:
    image: pgvector/pgvector:pg16
    labels:
      dev.description: "PostgreSQL database with pgvector"
    container_name: rooteditorial_postgres
    environment:
      POSTGRES_DB: rooteditorial
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rooteditorial

  # ========================================
  # MinIO — S3-compatible object storage (local dev)
  # ========================================
  minio:
    image: minio/minio:latest
    labels:
      dev.description: "S3-compatible object storage (local dev)"
    container_name: rooteditorial_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # CORS for browser presigned uploads (dev only)
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000,http://localhost:3002"
    volumes:
      - minio_data:/data
    networks:
      - rooteditorial
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================
  # MinIO bucket init (creates "media" bucket on first run)
  # ========================================
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/media;
      mc anonymous set download local/media;
      echo 'Bucket ready';
      "
    networks:
      - rooteditorial

  # ========================================
  # Server (Axum HTTP API)
  # ========================================
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile.dev
    labels:
      dev.description: "Rust API server"
      dev.shell: "bash"
    container_name: rooteditorial_server
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rooteditorial
      SERVER_PORT: 9080
      RUST_LOG: ${RUST_LOG:-info,server_core=debug}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_VERIFY_SERVICE_SID: ${TWILIO_VERIFY_SERVICE_SID}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_ISSUER: ${JWT_ISSUER:-rooteditorial}
      TEST_IDENTIFIER_ENABLED: ${TEST_IDENTIFIER_ENABLED:-false}
      ADMIN_IDENTIFIERS: ${ADMIN_IDENTIFIERS:-}
      PII_SCRUBBING_ENABLED: ${PII_SCRUBBING_ENABLED:-false}
      # S3-compatible storage (MinIO for local dev)
      S3_ENDPOINT: http://minio:9000
      S3_PRESIGN_ENDPOINT: http://localhost:9000
      S3_BUCKET: media
      S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_PUBLIC_URL: http://localhost:9000/media
    ports:
      - "9080:9080"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - ./packages/server:/app/packages/server
      - ./packages/ai-client:/app/packages/ai-client
      - rust_target:/app/target
    command: cargo watch -w /app/packages/server -w /app/packages/ai-client -w /app/packages/twilio-rs -s 'cargo run --bin server'
    networks:
      - rooteditorial

  # ========================================
  # Admin App (CMS Interface)
  # ========================================
  admin-app:
    build:
      context: .
      dockerfile: packages/admin-app/Dockerfile.dev
    labels:
      dev.description: "Next.js admin app (SSR)"
    container_name: rooteditorial_admin_app
    environment:
      API_URL: http://server:9080
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - ./packages/admin-app:/app/packages/admin-app
      - ./packages/shared:/app/packages/shared
      - ./yarn.lock:/app/yarn.lock:ro
      - admin_node_modules:/app/node_modules
      - admin_app_node_modules:/app/packages/admin-app/node_modules
      - admin_next_cache:/app/packages/admin-app/.next
    networks:
      - rooteditorial
    restart: unless-stopped

  # ========================================
  # Web App (Public Site)
  # ========================================
  web-app:
    build:
      context: .
      dockerfile: packages/web-app/Dockerfile.dev
    labels:
      dev.description: "Next.js public web app (SSR)"
    container_name: rooteditorial_web_app
    environment:
      API_URL: http://server:9080
      NODE_ENV: development
      PORT: 3001
      HOSTNAME: "0.0.0.0"
    ports:
      - "3001:3001"
    depends_on:
      - server
    volumes:
      - ./packages/web-app:/app/packages/web-app
      - ./packages/shared:/app/packages/shared
      - ./yarn.lock:/app/yarn.lock:ro
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/packages/web-app/node_modules
      - web_next_cache:/app/packages/web-app/.next
    networks:
      - rooteditorial
    restart: unless-stopped

# ========================================
# Volumes for data persistence
# ========================================
volumes:
  postgres_data:
    name: rooteditorial_postgres_data
  rust_target:
    name: rooteditorial_rust_target
  minio_data:
    name: rooteditorial_minio_data
  admin_node_modules:
    name: rooteditorial_admin_node_modules
  admin_app_node_modules:
    name: rooteditorial_admin_app_node_modules
  admin_next_cache:
    name: rooteditorial_admin_next_cache
  web_node_modules:
    name: rooteditorial_web_node_modules
  web_app_node_modules:
    name: rooteditorial_web_app_node_modules
  web_next_cache:
    name: rooteditorial_web_next_cache

# ========================================
# Network for service communication
# ========================================
networks:
  rooteditorial:
    name: rooteditorial_network
    driver: bridge
